<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Literature Digest</title>
  <meta name="theme-color" content="#f0ebe3">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <!-- Book icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Literature Digest</h1>
        <p id="metaText">Loading...</p>
      </div>
    </div>
  </header>

  <div class="filters">
    <div class="field date-mode-field">
      <label for="dateMode">日期维度</label>
      <select id="dateMode">
        <option value="crawled_date">抓取日期</option>
        <option value="published_date">发表日期</option>
      </select>
    </div>

    <div class="field start-date-field">
      <label for="startDate">开始日期</label>
      <input id="startDate" type="date">
    </div>

    <div class="field end-date-field">
      <label for="endDate">结束日期</label>
      <input id="endDate" type="date">
    </div>

    <div class="field quick-range-field">
      <label>快捷时间</label>
      <div class="quick-range" id="quickRange">
        <button type="button" class="btn" data-range="today">今天</button>
        <button type="button" class="btn" data-range="3d">过去 3 天</button>
        <button type="button" class="btn" data-range="7d">过去 1 周</button>
        <button type="button" class="btn" data-range="all">全部</button>
      </div>
    </div>

    <div class="field search-field">
      <label for="keyword">关键词</label>
      <input id="keyword" type="text" placeholder="标题 / 作者 / 摘要">
    </div>

    <div class="field">
      <label>收藏筛选</label>
      <label class="switch-label">
        <input id="favoriteOnly" type="checkbox">
        <span>只看收藏</span>
      </label>
    </div>

    <div class="field relevance-field">
      <label for="minRelevance">最低相关性</label>
      <input id="minRelevance" type="number" min="0" max="1" step="0.05" value="0">
    </div>

    <div class="actions">
      <button id="applyBtn" class="btn btn-primary">筛选</button>
      <button id="resetBtn" class="btn">重置</button>
      <button id="exportFavBtn" class="btn">导出收藏</button>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="cards" id="cards"></div>

  <!-- Favorites Modal -->
  <div id="favModal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>收藏数据</h3>
      <p>复制以下内容发给 Hermes：</p>
      <textarea id="favJson" rows="8" readonly></textarea>
      <div class="btn-row">
        <button id="copyFavBtn" class="btn btn-primary">复制到剪贴板</button>
        <button id="closeFavBtn" class="btn">关闭</button>
      </div>
    </div>
  </div>

  <!-- Paper Card Template -->
  <template id="paperTpl">
    <article class="card">
      <div class="card-header">
        <!-- Journal badge: abbr on surface, full name in tooltip -->
        <span class="journal-badge" data-abbr="" data-full=""></span>
        <span class="year-pill"></span>
        <span class="interest-badge"></span>
        <span class="card-spacer"></span>
        <button class="favorite-btn" type="button" aria-label="收藏">☆</button>
      </div>

      <div class="card-title">
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <div class="card-meta">
        <!-- Author line -->
        <span class="meta-item meta-authors">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="meta-authors-text"></span>
        </span>
        <span class="meta-dot"></span>
        <!-- Published date -->
        <span class="meta-item meta-date">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="meta-date-text"></span>
        </span>
        <span class="meta-dot"></span>
        <!-- Cited by -->
        <span class="meta-item meta-cited">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
          <span class="meta-cited-text"></span>
        </span>
        <span class="meta-dot meta-rel-dot" style="display:none"></span>
        <!-- Relevance -->
        <span class="meta-item meta-rel" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="meta-rel-text"></span>
        </span>
      </div>

      <div class="card-tags">
        <!-- Dynamic tags rendered by JS -->
      </div>

      <div class="card-sections">
        <!-- Affiliations (collapsible) -->
        <div class="card-section" data-section="affiliations" style="display:none">
          <button class="section-toggle" aria-expanded="false" aria-controls="sec-affiliations">
            <span>作者单位</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="section-content" id="sec-affiliations">
            <p class="section-text"></p>
          </div>
        </div>

        <!-- Chinese summary (collapsible) -->
        <div class="card-section" data-section="summary-cn" style="display:none">
          <button class="section-toggle" aria-expanded="false" aria-controls="sec-cn">
            <span>中文总结</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="section-content" id="sec-cn">
            <p class="section-text"></p>
          </div>
        </div>

        <!-- Abstract (collapsible) -->
        <div class="card-section" data-section="abstract">
          <button class="section-toggle" aria-expanded="false" aria-controls="sec-abstract">
            <span>Abstract</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="section-content" id="sec-abstract">
            <p class="section-text"></p>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
